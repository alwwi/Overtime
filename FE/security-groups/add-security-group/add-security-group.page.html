<ion-header>
  <ion-toolbar style="z-index: 0;">
    <ion-button slot="start" (click)="mainService.navBack()" fill="clear" mode="md" icon="arrow-back-outline"
      style="margin-left: 8px;">
      <ion-icon name="arrow-back-outline" style="color: #0C1E2E; font-size: 24px;"></ion-icon>
    </ion-button>
    <ion-title mode="ios" class="ion-text-center text-large-blue">
      Security Group
    </ion-title>
  </ion-toolbar>
  <ion-row>
    <ion-col class="ion-no-padding">
      <div class="hceazy-segment" style="padding: 20px !important;">
        <ion-segment [scrollable]="true" [value]="segmentValue" (ionChange)="selectValue($event)">
          <ion-segment-button mode="ios" *ngFor="let p of listSegment" [value]="p.value" class="profile-segment">
            <ion-label>{{p.title}}</ion-label>
          </ion-segment-button>
        </ion-segment>
      </div>
    </ion-col>
  </ion-row>
</ion-header>

<ion-content class="bg-light-grey">
  <ion-row style="height: 100%;">
    <ion-col class="ion-no-padding">
      <div class="content" style="height: 100%;">
        <form (ngSubmit)="onSubmit()" class="form" #secgroupform="ngForm" *ngIf="segmentValue == 'General'">
          <ion-list>
            <ion-row class="label-group">
              <ion-label class="text-medium-red">*Required Field</ion-label>
            </ion-row>

            <ion-row style="margin-top: 10px;">
              <div class="hceazy-input-wrapper">
                <input autocomplete="off" class="hceazy-input" type="text" placeholder="Name" id="name" name="name"
                  ngModel [(ngModel)]="name" required="true" />
                <label class="hceazy-label" for="name">
                  Name<ion-text color="danger">*</ion-text>
                </label>
              </div>
            </ion-row>
          </ion-list>

          <ion-button class="blue-button" color="primary" [disabled]="!secgroupform.valid" type="submit">
            Submit
          </ion-button>
        </form>

        <div *ngIf="segmentValue == 'Details' || segmentValue == 'Matrix'" style="height: 100%;">
          <div *ngIf="isSkeletonLoading">
            <ion-row *ngFor="let p of [].constructor(5)">
              <ion-skeleton-text animated
                style="height: 150px; border-radius: 10px; width: 100%; margin-bottom: 10px;"></ion-skeleton-text>
            </ion-row>
          </div>

          <ion-row *ngIf="isEmpty && !isSkeletonLoading"
            style="height: 100%; display: flex; justify-content: center; align-items: center;">
            <app-no-data></app-no-data>
          </ion-row>

          <div *ngIf="!isEmpty && !isSkeletonLoading">
            <ion-row *ngFor="let p of listData;" style="display: flex; flex-direction: column;">
              <ion-card class="card-item">
                <ion-card-header style="padding: 10px;" *ngIf="segmentValue == 'Details'">
                  <ion-card-title class="text-medium">{{ p.authority }}</ion-card-title>
                </ion-card-header>
                <ion-card-header style="padding: 10px;" *ngIf="segmentValue != 'Details'">
                  <ion-card-title class="text-medium">{{ p.name ?? '-' }}</ion-card-title>
                </ion-card-header>

                <ion-card-content class="text-small1-dark-teal" style="padding: 0 10px 10px; font-weight: 400;">
                  {{ p.modifiedDate | date: 'd-MMM-y' }}
                </ion-card-content>

                <div class="button-container">
                  <ion-button color="primary" class="ion-text-capitalize text-small1-white edit-btn"
                    (click)="addDetail(p.id)">Edit
                    <ion-icon src="../../../../../../assets/icon/general/edit.svg" slot="start"></ion-icon>
                  </ion-button>
                  <ion-button color="danger" class="ion-text-capitalize text-small1-white remove-btn"
                    style="width: 100px !important;" (click)="onRemove(p)">Remove
                    <ion-icon name="trash" slot="start"></ion-icon>
                  </ion-button>
                </div>
              </ion-card>
            </ion-row>
          </div>
        </div>
      </div>
    </ion-col>
  </ion-row>
</ion-content>

<ion-footer class="ion-no-border" *ngIf="segmentValue == 'Details' || segmentValue == 'Matrix'">
  <ion-toolbar class="ion-text-center">
    <ion-row>
      <ion-col size="12">
        <ion-button color="warning" (click)="addDetail(null)" class="blue-button ion-text-capitalize">
          <ion-icon name="add"></ion-icon>
          Add Security Group{{segmentValue == "Details" ? " Detail" : " Matrix"}}
        </ion-button>
      </ion-col>
    </ion-row>
  </ion-toolbar>
</ion-footer>
